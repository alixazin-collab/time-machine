<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: rgb(236, 239, 208);
    font-family: fantasy;
    overflow-x: hidden;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: auto;
    text-align: center;
    padding-top: 20px;
}

/* Header */
h1 {
    font-size: 5vw;
    color: peru;
}

/* Main text */
.haiii {
    font-size: 12vw;
    color: rgb(229, 96, 178);
    margin: 10px 0;
}

.small-text {
    font-size: 4.5vw;
    color: rgb(142, 87, 49);
    margin: 5px 0;
}

/* Image */
img {
    width: 100%;
    max-width: 400px;
    height: auto;
    border: 5px solid rgb(92, 60, 9);
    margin: 20px auto;
    display: block;
}

/* Slider */
.cs {
    cursor: pointer;
    height: 12vw;
    overflow: hidden;
    width: 70%;
    margin: 20px auto;
    position: relative;
}

.cs p {
    font-size: 6vw;
    margin: 0;
    color: rgb(229,96,178);
}

/* Link */
a {
    display: block;
    margin-top: 30px;
    font-size: 7vw;
    color: rgb(142, 87, 49);
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

    <h1>click to interact ↓</h1>

    <p class="haiii">Haiii</p>

    <p class="small-text">happy 20th monthsary satoo :P !!</p>
    <p class="small-text">I love you always :)</p>
    <p class="small-text">(dili jud kaayo ni atchup haha)</p>

    <img src="ezgif-123e7de523521219.gif">

    <div class="cs" onclick="nextWord()">
        <div id="wordSlider">
            <p>bibi</p>
            <p>love</p>
            <p>baby</p>
            <p>langga</p>
            <p>ga</p>
            <p>langging</p>
            <p>lab</p>
            <p>crush</p>
            <p>Lex</p>
            <p>Bih</p>
            <p>Babe</p>
        </div>
    </div>

    <a href="missive.html">CLICK TO CONTINUE</a>

</div>

<script>
let index = 0;

function nextWord(){
    const slider = document.getElementById("wordSlider");
    const total = slider.children.length;

    index = (index + 1) % total;

    // consistent unit system (vw so mobile scales correctly)
    slider.style.transform = "translateY(" + (-6 * index) + "vw)";
}
</script>

</body>
</html>
